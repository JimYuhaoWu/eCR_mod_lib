    year: 2023
    journal: "Brazilian Journal of Medical and Biological Research"
    categories: [CR]
    status: rejected
    notes: "Cancer synthetic lethality study — no domain sequences or activity scores; CRISPR knockout, not domain engineering"

  - doi: "10.1038/s41467-025-60424-x"
