# literature/papers.yaml
# Master record of all papers assessed for the module library.
# status values:
#   integrated  – data already in the library pipeline
#   accepted    – reviewed, data to be integrated (add module_source when done)
#   rejected    – reviewed, not relevant or data not extractable
#   pending     – flagged by search, awaiting human review
#
# Do not edit entries with status: integrated manually.
# Use 03_record.py to record review decisions for pending entries.

